services:
  eyes-face-follow:
    build: .
    network_mode: host
    user: "${UID:-1000}:${GID:-1000}"
    devices:
      - /dev/dri
    environment:
      - XDG_RUNTIME_DIR
      - WAYLAND_DISPLAY
      - SDL_VIDEODRIVER=wayland
      - PYOPENGL_PLATFORM=egl
    volumes:
      - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}
